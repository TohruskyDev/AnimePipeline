version: "3.8"

name: animepipeline

networks:
  backend:
    driver: bridge

services:
  qb:
    image: superng6/qbittorrentee:4.4.5.10
    restart: always
    environment:
      - PUID=1026
      - PGID=100
    volumes:
      - ./docker/qb-config:/config
      - ./docker/downloads:/downloads
    ports:
      - "6881:6881"
      - "6881:6881/udp"
      - "8091:8080"

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    environment:
      TELEGRAM_API_ID: "26116667"
      TELEGRAM_API_HASH: "4ab6824ade37253ad00f3e2e4e3aa807"
      TELEGRAM_LOCAL: 1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"

volumes:
  telegram-bot-api-data:
